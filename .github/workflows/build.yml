# ─────────────────────────────────────────────────────────────────
# .github/workflows/build.yml
# Generated by QMK/Vial Wizard v5.6 on 2026-07-13
# ─────────────────────────────────────────────────────────────────
#
# This workflow automatically builds your firmware whenever you push
# changes to the keyboard folder. The compiled .uf2 / .hex / .bin
# file is uploaded as a GitHub Actions artifact you can download.
#
# HOW TO USE:
# 1. UNZIP this package. Push ALL extracted files/folders to the ROOT of a new GitHub repo.
#    Important: push the keyboards/ folder and .github/ folder, NOT the zip file itself.
# 2. Push a commit that touches keyboards/handwired/macropad/**
# 3. Go to Actions → latest run → download the artifact.
# 4. Flash the .uf2 (RP2040) or .hex (AVR) to your keyboard.
#
name: Build macropad
on:
  push:
    paths:
      - "keyboards/handwired/macropad/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Get your keyboard definition files
      - uses: actions/checkout@v4

      # Step 2: Get the Vial-QMK firmware base (the vial branch)
      - uses: actions/checkout@v4
        with:
          repository: vial-kb/vial-qmk
          # Убираем строку ref: 22, пусть качает последнюю версию
          submodules: recursive
          path: vial-qmk

      # Step 3: Install build dependencies
      - run: sudo apt-get update && sudo apt-get install -y python3 python3-pip git make rsync

      # Step 4: Install the QMK CLI tool
      - run: python3 -m pip install qmk && echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Step 5: Copy your keyboard definition into the vial-qmk tree
      - name: Prepare Keyboard
        run: |
          mkdir -p vial-qmk/keyboards/handwired/macropad
          cp -R keyboards/handwired/macropad/* vial-qmk/keyboards/handwired/macropad/

      # Step 6: Verify required files are present before building
      - run: |
          test -f vial-qmk/keyboards/handwired/macropad/keyboard.json || (echo "ERROR: keyboard.json missing" && exit 1)
          test -f vial-qmk/keyboards/handwired/macropad/keymaps/vial/vial.json || (echo "ERROR: vial.json missing" && exit 1)
          find vial-qmk/keyboards/handwired/macropad -type f -print

      # Step 7: Compile the firmware (V=1 = verbose output for debugging)
      - name: Build
        run: |
          cd vial-qmk
          make handwired/macropad:vial

      # Step 8: Collect the compiled firmware file(s)
      - run: |
          mkdir -p artifacts
          find vial-qmk/.build -type f \( -name "*.uf2" -o -name "*.bin" -o -name "*.hex" \) -exec cp {} artifacts/ \;
          echo "Firmware files:"; ls -lah artifacts
          test -n "$(ls -A artifacts)" || (echo "ERROR: No firmware found — check build log above" && exit 1)

      # Step 9: Upload so you can download from the Actions UI
      - uses: actions/upload-artifact@v4
        with:
          name: macropad_vial_firmware
          path: artifacts
